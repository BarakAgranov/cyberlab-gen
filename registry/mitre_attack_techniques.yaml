# Bundled MITRE ATT&CK technique seed (read locally; not live-fetched).
# Loaded by `load_mitre_techniques()` (cyberlab_gen/registries/loader.py) and consulted by
# the pre-Planner enrichment pass. It is NOT a `static_catalogs` entry and there is no
# `entries_ref` — it is a standalone bundled file of external-authority data. Source:
# registry-details.md §5.1 ("MITRE ATT&CK technique catalog ... read locally").
#
# Phase 1 ships a *seed* subset of the ATT&CK Enterprise matrix — enough to enrich the
# technique ids it carries and exercise the curated-blog walks. It is NOT a live mirror and
# NOT a membership gate: a well-formed id absent from this seed is left unverified, never
# rejected (ADR 0055/0058). It grows by maintainer PR until a real MITRE adapter is wired.
#
# Each entry: name (the technique id), display_name, tactic (one ATT&CK tactic the
# technique belongs to), and a short description. `name` matches the MitreTechniqueId
# pattern (T#### or T####.###).
entries:
  - name: T1078
    display_name: "Valid Accounts"
    tactic: "defense-evasion"
    description: "Adversaries obtain and abuse credentials of existing accounts."
  - name: T1078.004
    display_name: "Valid Accounts: Cloud Accounts"
    tactic: "defense-evasion"
    description: "Adversaries abuse valid cloud accounts to gain access."
  - name: T1098
    display_name: "Account Manipulation"
    tactic: "persistence"
    description: "Adversaries manipulate accounts to maintain access to systems."
  - name: T1190
    display_name: "Exploit Public-Facing Application"
    tactic: "initial-access"
    description: "Adversaries exploit weaknesses in internet-facing hosts or systems."
  - name: T1530
    display_name: "Data from Cloud Storage"
    tactic: "collection"
    description: "Adversaries access data from cloud storage objects."
  - name: T1552
    display_name: "Unsecured Credentials"
    tactic: "credential-access"
    description: "Adversaries search compromised systems for insecurely stored credentials."
  - name: T1552.005
    display_name: "Unsecured Credentials: Cloud Instance Metadata API"
    tactic: "credential-access"
    description: "Adversaries query the cloud instance metadata API for credentials."
  - name: T1580
    display_name: "Cloud Infrastructure Discovery"
    tactic: "discovery"
    description: "Adversaries enumerate cloud infrastructure resources and configuration."
