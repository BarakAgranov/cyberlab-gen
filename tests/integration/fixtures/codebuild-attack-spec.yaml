  - id: identify-unanchored-regex
    step_number: 2
    title: Identify the unanchored ACTOR_ID regex filter flaw
    description:
      value: All four projects implemented an ACTOR_ID filter locking builds to 
        approved maintainers, but the IDs were separated by a pipe (|) 
        character, revealing the filter is a regex pattern rather than a simple 
        list. The regex patterns were not anchored with ^ and $, so a regex 
        engine matches any string that merely contains an approved ID. Any 
        GitHub user ID that is a superstring of an approved ID therefore 
        bypasses the filter. All four repos used short maintainer IDs (6 or 7 
        digits).
      source: blog_explicit
      citations:
      - kind: blog_passage
        reference: "'the filter wasn't a simple list, it was a regex pattern. And
          it had a fatal flaw.'"
        location:
      - kind: blog_passage
        reference: "'Without the start ^ and end $ anchors... any GitHub user ID that
          is a superstring of an approved ID could bypass the filter.'"
        location:
      confidence:
      confidence_source:
      requires_user_confirmation: false
      reason:
      discrepancy_with_blog: false
      overridden_blog_value:
      discrepancy_classification:
      framework_enriched: false
    blog_excerpt: "The user IDs weren't separated by commas or spaces, but by a pipe
      | character. That small detail was the key: in regular expressions, the | character
      means \"OR\". ... The issue was simple but critical: the regex patterns weren't
      anchored. Without the start ^ and end $ anchors to require an exact match, a
      regex engine doesn't look for a string that perfectly matches the pattern, but
      one that merely contains it. This meant that any GitHub user ID that is a superstring
      of an approved ID could bypass the filter."
    techniques:
      mitre:
      - T1190
      tradecraft:
      - name: discovery:unanchored-regex-bypass
        description:
          value: Recognize that an unanchored regex allow-list (ACTOR_ID filter 
            without ^/$ anchors) permits superstring identifiers to bypass the 
            intended exact-match check.
          source: blog_explicit
          citations:
