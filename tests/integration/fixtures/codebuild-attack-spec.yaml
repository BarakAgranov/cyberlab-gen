  summary:
    value: Wiz Research discovered 'CodeBreach', a critical supply chain 
      vulnerability where four AWS-owned GitHub repositories' CodeBuild CI 
      pipelines used an ACTOR_ID webhook filter built on an unanchored regex. 
      The missing ^ and $ anchors meant any GitHub user whose numeric ID was a 
      superstring of an approved maintainer's ID could bypass the allow-list. By
      racing to register a new GitHub App bot user whose sequential ID 
      'eclipsed' a trusted maintainer's ID, an unauthenticated attacker could 
      trigger a privileged build via a malicious pull request, dump GitHub 
      credentials from build-environment process memory, and escalate to full 
      repository administrator over the AWS JavaScript SDK (aws/aws-sdk-js-v3) 
      and related repos — enabling a platform-wide supply chain compromise.
    source: blog_explicit
    citations:
    - kind: blog_passage
      reference: "Intro: 'Just two missing characters in a Regex filter allowed unauthenticated
        attackers to infiltrate the build environment and leak privileged credentials.'"
      location:
