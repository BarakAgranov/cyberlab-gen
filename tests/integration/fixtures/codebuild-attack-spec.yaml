reproducibility:
  classification_lab_level: partial_simulation
  caveats:
  - The eclipse/ID-race step depends on real GitHub infrastructure and cannot be
    deterministically reproduced offline.
  - AWS has patched the specific overlooked-process memory-dump path and the 
    affected repos' filters.
  - Downstream supply-chain release injection was a demonstrated path, not 
    executed.
  overall_assessment:
    value: The lab can faithfully reproduce most primitives — a public CodeBuild
      project with an unanchored ACTOR_ID regex filter, a malicious-PR-triggered
      build, a GitHub credential present in build-process memory, and 
      PAT-scope-to-admin escalation via the collaborator API — using self-hosted
      infrastructure and stand-in credentials. The one step that cannot be 
      faithfully reproduced is the 'eclipse' GitHub ID race (step 3), which 
      depends on GitHub's live global sequential-ID assignment and registration 
      traffic and is demonstration_only. The real AWS targets and the actual 
      release-injection are out of scope (token revoked, PoC halted).
