  - id: trigger-build-dump-creds
    step_number: 4
    title: Trigger a privileged build via malicious PR and dump GitHub 
      credentials from memory
    description:
      value: With the bot user able to bypass the ACTOR_ID filter, the 
        researchers opened a pull request against aws/aws-sdk-js-v3 that fixed a
        legitimate issue but buried a malicious NPM package dependency designed 
        to execute in the build environment. Submitting the PR triggered a 
        CodeBuild build; the payload dumped the memory of a process in the build
        environment to extract the GitHub credentials. A prior CodeBuild 
        memory-dump mitigation (added after the Amazon Q incident) had 
        overlooked this particular process. The recovered credential was a 
        GitHub Classic PAT belonging to aws-sdk-js-automation, scoped with repo 
        and admin:repo_hook.
      source: blog_explicit
      citations:
      - kind: blog_passage
        reference: "'Buried within the PR was the real payload: a new NPM package
          dependency designed to execute in the build environment and extract the
          GitHub credentials.'"
        location:
      - kind: blog_passage
        reference: "'Our payload retrieved the GH token by dumping the memory of a
          process within the build environment.'"
        location:
      confidence:
      confidence_source:
      requires_user_confirmation: false
      reason:
      discrepancy_with_blog: false
      overridden_blog_value:
      discrepancy_classification:
      framework_enriched: false
    blog_excerpt: 'We chose to target the aws/aws-sdk-js-v3 repository, preparing
      a pull request that fixes a legitimate issue. Buried within the PR was the real
      payload: a new NPM package dependency designed to execute in the build environment
      and extract the GitHub credentials. We submitted the PR, and soon after received
      a notification: a build had been triggered. Moments later, we had successfully
      obtained the GitHub credentials of the aws-sdk-js-v3 CodeBuild project. ...
      Our payload retrieved the GH token by dumping the memory of a process within
      the build environment. A previous memory dump mitigation in CodeBuild, which
      AWS implemented in response to the Amazon Q incident, overlooked this particular
      process. ... The credentials we obtained were a GitHub Classic Personal Access
      Token (PAT) belonging to the aws-sdk-js-automation user.'
    techniques:
      mitre:
