  - id: register-eclipse-id
    step_number: 3
    title: Win the race to register a GitHub ID that 'eclipses' a trusted 
      maintainer ID
    description:
      value: Because GitHub assigns unique sequential numeric IDs (~200,000/day,
        ~2/second), a new longer ID containing a short maintainer's ID 
        inevitably becomes available roughly every five days (an 'eclipse'). 
        reCAPTCHA blocks automated standard sign-ups, and GitHub organizations 
        (which share the ID pool) cannot open PRs. The breakthrough was the 
        GitHub App manifest flow, which generates a bot user able to interact 
        with PRs and can be made atomic — the bot is created only when a final 
        confirmation URL is visited. The attackers used the 
        organization-creation API as an ID sampling tool to predict the eclipse,
        prepared 200 GitHub App manifest confirmation URLs, waited until the 
        live ID count was ~100 IDs away from the target, then visited all 200 
        URLs simultaneously, capturing target ID 226755743 which contained a 
        trusted aws/aws-sdk-js-v3 maintainer ID.
      source: blog_explicit
      citations:
      - kind: blog_passage
        reference: "'GitHub creates roughly 200,000 new IDs each day... a new, longer
          ID containing it would become available for registration approximately every
          five days. We dubbed this... an \"eclipse\"'"
        location:
      - kind: blog_passage
        reference: "'We waited until the live ID count was just ~100 IDs away from
          the target ID, and then visited all 200 URLs at once... The target ID was
          226755743'"
        location:
      confidence:
      confidence_source:
      requires_user_confirmation: false
      reason:
      discrepancy_with_blog: false
      overridden_blog_value:
      discrepancy_classification:
      framework_enriched: false
    blog_excerpt: "The real breakthrough came from GitHub Apps. Creating an app generates
      a corresponding bot user (e.g. app-name[bot]) that can interact with pull requests.
      It's also possible to automate app creation via the manifest flow. While it's
      composed of a few steps, it can be made atomic: the app and its bot are only
      created when a final confirmation URL is visited. This allowed us to prepare
      hundreds of app creation requests in advance and then, at the precise moment,
      visit all their confirmation URLs simultaneously. ... We also initiated the
      manifest flow for 200 new GitHub Apps, collecting their unique confirmation
      URLs. We waited until the live ID count was just ~100 IDs away from the target
      ID, and then visited all 200 URLs at once, triggering a flood of new bot user
      registrations. The target ID was 226755743, which contained a trusted maintainer
      ID for the aws/aws-sdk-js-v3 repository."
    techniques:
      mitre:
      - T1136.003
      - T1586
      tradecraft:
      - name: tradecraft:github-id-sampling
        description:
          value: Use the GitHub organization-creation API as a real-time ID 
            sampler to predict the moment a target sequential ID becomes 
            registerable.
          source: blog_explicit
          citations:
          - kind: blog_passage
            reference: "'We repurposed this API into an ID sampling tool: we could
              create an organization, check its ID... and then immediately delete
              it.'"
            location:
          confidence:
          confidence_source:
          requires_user_confirmation: false
          reason:
          discrepancy_with_blog: false
          overridden_blog_value:
          discrepancy_classification:
          framework_enriched: false
        evades_what:
      - name: tradecraft:manifest-flow-id-race
        description:
          value: Exploit the atomic GitHub App manifest confirmation-URL flow to
            batch-create hundreds of bot users at a precise instant, winning a 
            sequential-ID race condition against global registration traffic.
          source: blog_explicit
          citations:
          - kind: blog_passage
            reference: "'it can be made atomic: the app and its bot are only created
              when a final confirmation URL is visited... visit all their confirmation
