  vulnerability_story:
    value: CodeBuild projects connected to GitHub hold GitHub credentials in the
      build environment's memory by default. The four affected AWS repositories 
      defended PR-triggered builds with an ACTOR_ID webhook filter — an 
      allow-list of approved maintainer GitHub IDs — but the filter is a regex 
      and the patterns were not anchored with ^ and $. An unanchored regex 
      matches any string that merely contains the pattern, so a longer GitHub ID
      containing an approved ID as a substring bypasses the filter. Because 
      GitHub assigns sequential numeric IDs (~200k/day), a new ID 'eclipsing' a 
      short 6-7 digit maintainer ID becomes registerable roughly every five 
      days; the attacker wins the registration race via the GitHub App manifest 
      flow, then triggers a privileged build and dumps the GitHub PAT from 
      process memory.
    source: blog_explicit
    citations:
    - kind: blog_passage
      reference: "'To interact with GitHub, CodeBuild requires GitHub credentials,
        which are, by default, present in the memory of the build environment.'"
      location:
    - kind: blog_passage
      reference: "'Without the start ^ and end $ anchors to require an exact match...
        any GitHub user ID that is a superstring of an approved ID could bypass the
        filter.'"
      location:
