# Curated blog set manifest. Phase 1 (Task 8): grown from the Phase-0
# placeholder skeleton to the real walked blogs plus one long blog to exercise
# chunking (implementation-plan.md §4.3 "grow to 3-5 blogs", §4.6 long-blog
# risk). The Phase-0 placeholders whose walks were never written have been
# removed; every `walk:` path below now resolves to a real file under
# dev/curated-blog-walks/ (enforced by tests/eval/test_manifest.py).
#
# Schema invented (eval.md §7.3 names the file but specifies no shape) —
# see dev/decisions/0014-blog-set-manifest-schema.md (authoritative).
# Harness-loader + per-run metrics: dev/decisions/0025-eval-harness-phase1-shape.md.

spec_version: 1
spec_kind: BlogSetManifest

# Rotation generation. Bumped each release when blogs move between curated and
# held_out. Held-out rotation lands in Phase 4 (implementation-plan.md §1.6);
# Phase 1 ships generation 0 with an empty held_out set.
rotation_generation: 0

